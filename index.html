<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Untuk Kamu</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(to bottom, #1d1037, #522258, #c95c8a);
}

/* stars */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:.2}
    to{opacity:1}
}

/* shooting star */
.shooting-star{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(to right,white,transparent);
    transform:rotate(-35deg);
    animation:shoot 4s linear infinite;
}

@keyframes shoot{
    0%{top:-10%; left:-20%; opacity:0;}
    20%{opacity:1;}
    100%{top:120%; left:120%; opacity:0;}
}

/* envelope */
.envelope{
    position:relative;
    width:280px;
    height:190px;
    cursor:pointer;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#ffd6ea;
    border-radius:0 0 12px 12px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ffb8d8;
    clip-path:polygon(0 0,100% 0,50% 55%);
    transform-origin:top;
    transition:0.8s;
}

.open .flap{
    transform:rotateX(180deg);
}

/* letter */
.letter{
    position:absolute;
    width:85%;
    left:7.5%;
    top:20px;
    background:white;
    border-radius:12px;
    padding:18px;
    color:#444;
    text-align:center;
    line-height:1.6;
    transform:translateY(120px);
    opacity:0;
    transition:1s;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.open .letter{
    transform:translateY(-110px);
    opacity:1;
}

/* title */
.title{
    position:absolute;
    top:40px;
    color:white;
    text-align:center;
    width:100%;
    font-size:22px;
}

/* buttons */
.share-btn{
    position:absolute;
    bottom:-90px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 14px;
    border:none;
    border-radius:20px;
    background:#ffffffcc;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="title">🌙 Sebuah Surat Untuk Kamu ✨</div>

<div class="shooting-star"></div>

<div class="envelope" onclick="openLetter()" id="env">

    <div class="base"></div>
    <div class="flap"></div>

    <div class="letter">
        <h3>💌 Hai kamu</h3>

        morninggg, semangat ya buat hari ini ✨  
        aku cuma bisa support dari jauh aja  

        <br><br>

        pokoknya secape dan sepusing apapun hari ini,  
        jangan lupa buat nyunggingin senyum tipis ya  

        <br><br>

        karena seulas senyum tipismu  
        bisa bikin hatimu sedikit lebih lega  

        <br><br>

        i love u, always 🩶

        <br><br>

        ⭐🩶🌙
    </div>

    <button class="share-btn" onclick="shareLetter(event)">
        🔗 Share Surat
    </button>

</div>

<script>

// stars
for(let i=0;i<100;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(star);
}

// open letter
function openLetter(){
    document.getElementById("env").classList.toggle("open");
}

// share
function shareLetter(e){
    e.stopPropagation();

    const url = window.location.href;

    if(navigator.share){
        navigator.share({
            title: "💌 Surat Untuk Kamu",
            text: "Aku kirim sesuatu buat kamu 🩶",
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        alert("link sudah disalin 💌");
    }
}

</script>

</body>
</html>
